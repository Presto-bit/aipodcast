# Docker 全栈 + Playwright：使用 docker-compose.e2e.yml（Redis 库 /1）与 --profile e2e（e2e-ready 就绪探测）。
# 资源与构建耗时较高：默认在 main 与手动触发上运行；PR 如需开启可改 on.pull_request。

name: E2E

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.ai-native.example .env.ai-native

      - name: Build and start stack (e2e overlay + profile)
        run: |
          docker compose -f docker-compose.ai-native.yml -f docker-compose.e2e.yml --env-file .env.ai-native --profile e2e up -d --build

      - name: Wait for e2e-ready probe
        run: |
          set -e
          COMPOSE="docker compose -f docker-compose.ai-native.yml -f docker-compose.e2e.yml"
          for i in $(seq 1 120); do
            cid=$($COMPOSE ps -aq e2e-ready 2>/dev/null || true)
            if [ -n "$cid" ]; then
              status=$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo "")
              if [ "$status" = "exited" ]; then
                code=$(docker inspect -f '{{.State.ExitCode}}' "$cid")
                echo "e2e-ready exit=$code"
                if [ "$code" != "0" ]; then
                  $COMPOSE logs --tail=120 e2e-ready web orchestrator
                  exit 1
                fi
                python3 -c "import json,urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:8008/health',timeout=5)); assert d.get('ok') and d.get('postgres')=='ok', d"
                exit 0
              fi
            fi
            if [ "$i" -eq 120 ]; then
              echo "e2e-ready did not finish"
              $COMPOSE ps -a
              $COMPOSE logs --tail=120
              exit 1
            fi
            sleep 2
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: apps/web
        env:
          CI: "1"
          ORCHESTRATOR_URL: http://127.0.0.1:8008
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          E2E_SMOKE_SECRET: ci-e2e-smoke-local
          E2E_SMOKE_LOGIN_PASSWORD: E2eSmoke!ci900
          INTERNAL_SIGNING_SECRET: local-internal-secret
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-output
          path: |
            apps/web/playwright-report/
            apps/web/test-results/

# 宿主机端口默认绑定 127.0.0.1，避免 Postgres/Redis/MinIO/编排器 对公网暴露（见 DEPLOYMENT.md）。
# 需局域网直连调试时，可临时改为 "0.0.0.0:端口:端口" 或使用 SSH 隧道。
# 默认使用 Docker Hub 短名，与「docker pull + docker save/load」离线包一致；国内/私有库可在 .env.ai-native 设 POSTGRES_IMAGE 等覆盖。
# 离线构建勿访问 registry-1.docker.io：先 load 基础镜像，再用 scripts/docker-compose-offline.sh 或 make up-offline（DOCKER_BUILDKIT=0）。
# 固定 amd64，与阿里云 ECS 一致；避免 Apple Silicon 默认打成 arm64 镜像后在服务器无法运行。
services:
  postgres:
    platform: linux/amd64
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    env_file:
      - .env.ai-native
    environment:
      POSTGRES_USER: ${DB_USER:-aipodcast}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aipodcast}
      POSTGRES_DB: ${DB_NAME:-aipodcast}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      # 使用容器内已注入的 POSTGRES_*（与 environment 块一致）
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s
    restart: unless-stopped

  redis:
    platform: linux/amd64
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      # 显式 127.0.0.1，避免个别环境仅监听 IPv4 时 localhost 解析异常
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  minio:
    platform: linux/amd64
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: server /data --console-address ":9001"
    env_file:
      - .env.ai-native
    environment:
      MINIO_ROOT_USER: ${OBJECT_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    # 使用 127.0.0.1；若极旧镜像无 curl，请换较新 minio/minio 或固定带 curl 的 RELEASE 标签
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  orchestrator:
    platform: linux/amd64
    image: aipodcast-orchestrator:${AIPODCAST_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
      pull: false
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    env_file:
      - .env.ai-native
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      OBJECT_ENDPOINT: http://minio:9000
    ports:
      - "127.0.0.1:8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 6s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  ai-worker:
    platform: linux/amd64
    image: aipodcast-ai-worker:${AIPODCAST_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: workers/ai-worker/Dockerfile
      pull: false
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    env_file:
      - .env.ai-native
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      OBJECT_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  media-worker:
    platform: linux/amd64
    image: aipodcast-media-worker:${AIPODCAST_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: workers/media-worker/Dockerfile
      pull: false
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    env_file:
      - .env.ai-native
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      OBJECT_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  web:
    platform: linux/amd64
    image: aipodcast-web:${AIPODCAST_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      pull: false
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
    env_file:
      - .env.ai-native
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: AI Native Studio
      # 容器内 BFF 必须走编排器服务名，不能用 127.0.0.1（那会指向 web 容器自身）
      ORCHESTRATOR_URL: http://orchestrator:8008
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:

# E2E：叠加 `docker-compose.e2e.yml` 并加 `--profile e2e`（Redis 库隔离 + 就绪探测），见该文件注释与 docs/operations/README.md。

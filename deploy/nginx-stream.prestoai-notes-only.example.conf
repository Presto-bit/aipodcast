# =============================================================================
# 示例：stream.prestoai.cn（或任意「仅知识库问答 BFF」子域）
# - 只反代前缀 /api/notes/ask* 到本机 Next（改 proxy_pass 端口）
# - 根路径 302 到主站；其余 404
#
# 若浏览器仍报「网关超时 504」且错误页含 Tengine / SLB / CDN：
#   说明在「浏览器 → 本段 Nginx 之前或之后」还有一层超时更短的代理。
#   须在每一跳放宽读超时（建议 ≥300s，慢检索 + 首 token 易超 60s）：
#   - 本文件内 proxy_read_timeout / proxy_send_timeout
#   - 阿里云 **负载均衡 SLB/ALB**：监听 / 服务器组 → 高级配置里的连接/传输超时（名称因产品而异）
#   - 阿里云 **CDN / DCDN / 全站加速**：回源 HTTP 响应超时、回源长连接超时
#   - **勿**将 stream CNAME 到「仅适合静态」的 CDN 域名后又指望长 SSE；DNS 应 A/AAAA 到 ECS 或 SLB
#
# 使用：合并进宝塔「网站 → stream.xxx → 配置文件」的 server{}，nginx -t 后 reload。
# 宝塔 proxy.conf 若默认 proxy_cache，本 location 内务必 proxy_cache off;（与主站示例一致）

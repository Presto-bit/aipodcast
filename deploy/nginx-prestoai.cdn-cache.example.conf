# 示例：prestoai.cn 反代 Docker Web（127.0.0.1:3000），配合「缓存分层」与「HTML 不长缓存」。
# 使用方式：复制到宝塔/自建 Nginx 的 server 块内，按域名与证书修改；执行 nginx -t 后 reload。
# 注意：若 HTTPS 在另一段 server{}，请将下列 location 同步到 443 的 server 中。
#
# 发版后「ECS 上新、https://prestoai.cn 仍旧」：多为阿里云 CDN 边缘缓存未刷新，见 DEPLOYMENT.md「4）阿里云 CDN」；
# 勿在 location / 上套全站 proxy_cache；可选在 .env.ai-native 配置 ALIYUN_CDN_* 让 release.sh 成功后自动刷新。
#
# 宝塔：主配置 include 的 /www/server/nginx/conf/proxy.conf 含「proxy_cache cache_one;」，会对**所有**反代默认启用磁盘缓存，
# 导致本机 curl 127.0.0.1:80 与 :3000 的 HTML 不一致（旧页被缓在 /www/server/nginx/proxy_cache_dir）。务必在每个反代 location 内写：
#     proxy_cache off;

# server {
#     listen 80;
#     listen 443 ssl http2;
#     server_name prestoai.cn www.prestoai.cn;
#     client_max_body_size 100m;
#
#     # 1）带 hash 的 Next 静态资源：可长缓存（源站 Next 通常已返回 immutable；此处勿再套 proxy_cache 磁盘缓存整站）
#     # 宝塔 http 级 gzip 与上游压缩叠用时，易出现 Content-Length 与实体不一致 → 浏览器 ERR_CONTENT_LENGTH_MISMATCH；
